name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TEST_RELEASE_TAG: test-build

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            command: pnpm dist:mac
            artifact: release-macos
            files: |
              release/*.dmg
              release/*.pkg
          - os: windows-latest
            command: pnpm dist:win
            artifact: release-windows
            files: |
              release/*.exe
              release/*.msi

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.0.7

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Configure npm mirror
        run: pnpm config set registry https://registry.npmmirror.com/

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/

      - name: Verify
        run: |
          pnpm lint
          pnpm test

      - name: Build installers
        run: ${{ matrix.command }}
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.files }}
          if-no-files-found: error

  publish:
    name: Publish GitHub test release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Move test release tag
        run: |
          git tag -f "$TEST_RELEASE_TAG" "$GITHUB_SHA"
          git push origin "$TEST_RELEASE_TAG" --force

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TEST_RELEASE_TAG }}
          name: Markora Test Build
          prerelease: true
          make_latest: true
          body: |
            Markora 滚动测试构建。

            此 Release 会由 GitHub Actions 基于 main 分支最新提交自动重新打包和更新。

            提交：${{ github.sha }}

            包含资产：
            - macOS DMG 和 PKG 安装包
            - Windows NSIS EXE 和 MSI 安装包

            验证：
            - lint
            - 单元测试
            - electron-builder 打包
          files: artifacts/**/*
